services:
  agentforge:
    build:
      context: ../..
      dockerfile: examples/06-docker-deploy/Dockerfile
    image: agentforge:latest
    container_name: agentforge
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8766:8766"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; r = urllib.request.urlopen('http://127.0.0.1:8766/readyz', timeout=3); exit(0 if r.status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

