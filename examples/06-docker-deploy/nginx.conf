# Reverse proxy for AgentForge.
# - WebSocket / SSE support for future streaming features
# - /readyz and /health bypass auth
# - Everything else proxied to the agentforge container

upstream agentforge_backend {
    server agentforge:8766;
    keepalive 32;
}

# HTTP -> HTTPS redirect (uncomment in production with valid TLS certs)
# server {
#     listen 80 default_server;
#     server_name _;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 16M;  # webhook payloads
    proxy_read_timeout 300s;   # LLM calls can be slow

    # Health endpoints — let upstream respond directly
    location = /health {
        proxy_pass http://agentforge_backend;
        access_log off;
    }
    location = /readyz {
        proxy_pass http://agentforge_backend;
        access_log off;
    }

    # Metrics endpoint — restrict in production via allow/deny
    location = /metrics {
        proxy_pass http://agentforge_backend;
        # allow 10.0.0.0/8;
        # deny all;
    }

    # Everything else (API, dashboard, webhooks)
    location / {
        proxy_pass http://agentforge_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
